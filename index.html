<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مقایسه رنگ چوب</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 25px 15px;
      background: #ffffff;
      color: #262626;
      font-family: Tahoma, Arial, sans-serif;
    }

    .wood-tool {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    /* =========================
       بخش بالایی
    ========================= */
    .comparison-section {
      direction: ltr;
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      gap: 28px;
      padding: 22px;
      background: #fcfbfa;
      border: 1px solid #f0eeec;
      border-radius: 18px;
      box-shadow: 0 5px 24px rgba(57, 37, 20, 0.06);
    }

    /* =========================
       انتخاب نوع چوب
    ========================= */
    .wood-selector {
      direction: rtl;
      padding: 8px 16px 16px;
      background: #ffffff;
      border-radius: 13px;
      box-shadow: 0 5px 18px rgba(40, 28, 18, 0.04);
    }

    .wood-selector h2 {
      margin: 0 0 7px;
      font-size: 19px;
      color: #202020;
    }

    .wood-selector p {
      margin: 0 0 16px;
      color: #777;
      font-size: 12px;
    }

    .wood-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .wood-btn {
      width: 100%;
      min-height: 39px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 5px 8px 5px 12px;
      border: 1px solid #dedad6;
      border-radius: 7px;
      background: #fff;
      color: #38332f;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .wood-btn:hover {
      border-color: #8a8179;
    }

    .wood-btn.active {
      background: #1e3121;
      border-color: #1e3121;
      color: #fff;
    }

    .wood-thumb {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 50%;
      background-color: #b88960;
      background-image: linear-gradient(
        135deg,
        #d7b18a,
        #8f5e3b 48%,
        #c59a6e
      );
      background-size: cover;
      background-position: center;
    }

    .wood-btn.active .wood-thumb {
      border-color: rgba(255, 255, 255, 0.4);
    }

    /* =========================
       بخش مقایسه قبل و بعد
    ========================= */
    .comparison-area {
      direction: rtl;
      min-width: 0;
    }

    .comparison-box {
      position: relative;
      width: 100%;
      aspect-ratio: 2.55 / 1;
      overflow: hidden;
      border-radius: 16px;
      background: #a66c41;
      cursor: ew-resize;
      user-select: none;
      touch-action: none;
    }

    .comparison-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      pointer-events: none;
    }

    /*
      عکس بعد از رنگ شدن از سمت راست نمایش داده می‌شود.
      مقدار clip-path توسط JavaScript تغییر می‌کند.
    */
    .after-image {
      clip-path: inset(0 0 0 50%);
    }

    .compare-label {
      position: absolute;
      top: 16px;
      z-index: 4;
      min-width: 54px;
      padding: 8px 13px;
      border-radius: 5px;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      pointer-events: none;
    }

    .label-before {
      left: 18px;
      background: #ffffff;
      color: #242424;
    }

    .label-after {
      right: 18px;
      background: #19301e;
      color: #ffffff;
    }

    .comparison-line {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      z-index: 5;
      width: 3px;
      background: #ffffff;
      transform: translateX(-50%);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.2);
      pointer-events: none;
    }

    .comparison-handle {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: 1px solid #e1ded9;
      border-radius: 50%;
      background: #ffffff;
      color: #282828;
      font-size: 25px;
      font-weight: bold;
      transform: translate(-50%, -50%);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
      pointer-events: none;
    }

    .comparison-help {
      margin: 10px 0 0;
      color: #706b65;
      text-align: center;
      font-size: 11px;
    }

    /* =========================
       بخش انتخاب رنگ
    ========================= */
    .colors-section {
      direction: ltr;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 36px;
      align-items: center;
      margin-top: 26px;
      padding: 0 7px;
    }

    .water-image {
      width: 100%;
      aspect-ratio: 1.75 / 1;
      overflow: hidden;
      border-radius: 13px;
      background-color: #9a6843;
      background-image: linear-gradient(135deg, #d2a16d, #73401e);
      background-size: cover;
      background-position: center;
      box-shadow: 0 5px 14px rgba(42, 26, 14, 0.13);
    }

    .colors-content {
      direction: rtl;
      min-width: 0;
    }

    .colors-title {
      margin-bottom: 22px;
    }

    .colors-title h2 {
      margin: 0 0 7px;
      color: #1d1d1d;
      font-size: 19px;
    }

    .colors-title p {
      margin: 0;
      color: #78716b;
      font-size: 12px;
    }

    .colors-list {
      display: grid;
      grid-template-columns: repeat(6, minmax(60px, 1fr));
      gap: 14px;
    }

    .color-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #4a4540;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: bold;
    }

    .color-dot {
      width: 54px;
      height: 54px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      transition: 0.2s ease;
    }

    .color-btn:hover .color-dot {
      transform: translateY(-3px);
    }

    .color-btn.active .color-dot {
      outline: 2px solid #19301e;
      outline-offset: 3px;
    }

    .color-name {
      text-align: center;
      line-height: 1.5;
    }

    /* =========================
       موبایل و تبلت
    ========================= */
    @media (max-width: 850px) {
      .comparison-section {
        direction: rtl;
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 16px;
      }

      .wood-list {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
      }

      .wood-btn {
        min-height: 74px;
        flex-direction: column-reverse;
        justify-content: center;
        padding: 7px 4px;
        font-size: 11px;
      }

      .comparison-box {
        aspect-ratio: 1.65 / 1;
      }

      .colors-section {
        direction: rtl;
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 0;
      }

      .water-image {
        max-width: 360px;
      }

      .colors-list {
        grid-template-columns: repeat(3, 1fr);
        gap: 20px 12px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .wood-list {
        grid-template-columns: repeat(3, 1fr);
      }

      .comparison-box {
        aspect-ratio: 1.18 / 1;
      }

      .compare-label {
        top: 10px;
        min-width: 44px;
        padding: 6px 9px;
        font-size: 11px;
      }

      .label-before {
        left: 10px;
      }

      .label-after {
        right: 10px;
      }

      .comparison-handle {
        width: 43px;
        height: 43px;
        font-size: 21px;
      }
    }
  </style>
</head>

<body>

  <main class="wood-tool">

    <section class="comparison-section">

      <aside class="wood-selector">
        <h2>تفاوت قبل و بعد را ببینید</h2>
        <p>نوع چوب را انتخاب کنید</p>

        <div class="wood-list">

          <button class="wood-btn active" type="button" data-wood="oak">
            <span>بلوط</span>
            <span class="wood-thumb" id="thumb-oak"></span>
          </button>

          <button class="wood-btn" type="button" data-wood="walnut">
            <span>گردو</span>
            <span class="wood-thumb" id="thumb-walnut"></span>
          </button>

          <button class="wood-btn" type="button" data-wood="beech">
            <span>راش</span>
            <span class="wood-thumb" id="thumb-beech"></span>
          </button>

          <button class="wood-btn" type="button" data-wood="thermowood">
            <span>ترمووود</span>
            <span class="wood-thumb" id="thumb-thermowood"></span>
          </button>

          <button class="wood-btn" type="button" data-wood="russian">
            <span>چوب روسی</span>
            <span class="wood-thumb" id="thumb-russian"></span>
          </button>

        </div>
      </aside>

      <section class="comparison-area">

        <div class="comparison-box" id="comparisonBox">

          <div class="comparison-image before-image" id="beforeImage"></div>
          <div class="comparison-image after-image" id="afterImage"></div>

          <span class="compare-label label-before">قبل</span>
          <span class="compare-label label-after">بعد</span>

          <div class="comparison-line" id="comparisonLine"></div>

          <div class="comparison-handle" id="comparisonHandle">
            ‹ ›
          </div>

        </div>

        <p class="comparison-help">
          با کشیدن دکمه وسط به چپ و راست، تفاوت قبل و بعد را مشاهده کنید.
        </p>

      </section>

    </section>

    <section class="colors-section">

      <!-- در صورت داشتن عکس قطره آب، مسیر آن را در جاوااسکریپت وارد کنید -->
      <div class="water-image" id="waterImage"></div>

      <div class="colors-content">

        <div class="colors-title">
          <h2>انتخاب رنگ</h2>
          <p>رنگ مورد نظر خود را انتخاب کنید</p>
        </div>

        <div class="colors-list">

          <button class="color-btn active" type="button" data-color="natural">
            <span class="color-dot" id="dot-natural"></span>
            <span class="color-name">طبیعی</span>
          </button>

          <button class="color-btn" type="button" data-color="hazelnut">
            <span class="color-dot" id="dot-hazelnut"></span>
            <span class="color-name">فندقی</span>
          </button>

          <button class="color-btn" type="button" data-color="walnut">
            <span class="color-dot" id="dot-walnut"></span>
            <span class="color-name">گردویی</span>
          </button>

          <button class="color-btn" type="button" data-color="darkbrown">
            <span class="color-dot" id="dot-darkbrown"></span>
            <span class="color-name">قهوه‌ای تیره</span>
          </button>

          <button class="color-btn" type="button" data-color="mahogany">
            <span class="color-dot" id="dot-mahogany"></span>
            <span class="color-name">ماهاگونی</span>
          </button>

          <button class="color-btn" type="button" data-color="black">
            <span class="color-dot" id="dot-black"></span>
            <span class="color-name">مشکی</span>
          </button>

        </div>
      </div>

    </section>

  </main>

  <script>
    /*
    ============================================================
    مسیر عکس‌های خودتان را فقط در این بخش وارد یا تغییر دهید.
    ============================================================

    ساختار پیشنهادی پوشه‌ها در گیت‌هاب:

    images/
      oak/
        raw.jpg
        natural.jpg
        hazelnut.jpg
        walnut.jpg
        darkbrown.jpg
        mahogany.jpg
        black.jpg

      beech/
      walnut/
      russian/
      thermowood/

    نمونه:
    images/oak/raw.jpg
    images/oak/mahogany.jpg
    */

    const woods = {
      oak: {
        raw: "images/oak/raw.jpg.png",
        colors: {
          natural: "images/oak/natural.png",
          hazelnut: "images/oak/hazelnut.png",
          walnut: "images/oak/walnut.png",
          darkbrown: "images/oak/darkbrown.png",
          mahogany: "images/oak/mahogany.png",
          black: "images/oak/black.png"
        }
      },

      beech: {
        raw: "images/beech/raw.jpg",
        colors: {
          natural: "images/beech/natural.jpg",
          hazelnut: "images/beech/hazelnut.jpg",
          walnut: "images/beech/walnut.jpg",
          darkbrown: "images/beech/darkbrown.jpg",
          mahogany: "images/beech/mahogany.jpg",
          black: "images/beech/black.jpg"
        }
      },

      walnut: {
        raw: "images/walnut/raw.jpg",
        colors: {
          natural: "images/walnut/natural.jpg",
          hazelnut: "images/walnut/hazelnut.jpg",
          walnut: "images/walnut/walnut.jpg",
          darkbrown: "images/walnut/darkbrown.jpg",
          mahogany: "images/walnut/mahogany.jpg",
          black: "images/walnut/black.jpg"
        }
      },

      russian: {
        raw: "images/russian/raw.jpg",
        colors: {
          natural: "images/russian/natural.jpg",
          hazelnut: "images/russian/hazelnut.jpg",
          walnut: "images/russian/walnut.jpg",
          darkbrown: "images/russian/darkbrown.jpg",
          mahogany: "images/russian/mahogany.jpg",
          black: "images/russian/black.jpg"
        }
      },

      thermowood: {
        raw: "images/thermowood/raw.jpg",
        colors: {
          natural: "images/thermowood/natural.jpg",
          hazelnut: "images/thermowood/hazelnut.jpg",
          walnut: "images/thermowood/walnut.jpg",
          darkbrown: "images/thermowood/darkbrown.jpg",
          mahogany: "images/thermowood/mahogany.jpg",
          black: "images/thermowood/black.jpg"
        }
      }
    };

    /*
      اگر عکس قطره آب روی چوب دارید، آدرس آن را اینجا قرار دهید.
      مثال:
      const waterPhoto = "images/oil-water.jpg";

      اگر فعلاً عکس ندارید، مقدار را خالی بگذارید.
    */
    const waterPhoto = "";

    const colorFallbacks = {
      natural: "#d8b083",
      hazelnut: "#93613a",
      walnut: "#704222",
      darkbrown: "#3e2113",
      mahogany: "#6c2119",
      black: "#111111"
    };

    let selectedWood = "oak";
    let selectedColor = "natural";
    let sliderPosition = 50;
    let isDragging = false;

    const beforeImage = document.getElementById("beforeImage");
    const afterImage = document.getElementById("afterImage");
    const comparisonBox = document.getElementById("comparisonBox");
    const comparisonLine = document.getElementById("comparisonLine");
    const comparisonHandle = document.getElementById("comparisonHandle");
    const waterImage = document.getElementById("waterImage");

    function setImage(element, imagePath, fallbackColor) {
      element.style.backgroundColor = fallbackColor || "#a56d45";

      if (imagePath) {
        element.style.backgroundImage = "url('" + imagePath + "')";
      } else {
        element.style.backgroundImage = "none";
      }
    }

    function updateSlider(position) {
      sliderPosition = Math.max(0, Math.min(100, position));

      /*
        سمت چپ: قبل از رنگ
        سمت راست: بعد از رنگ
      */
      afterImage.style.clipPath =
        "inset(0 0 0 " + sliderPosition + "%)";

      comparisonLine.style.left = sliderPosition + "%";
      comparisonHandle.style.left = sliderPosition + "%";
    }

    function updateComparisonImages() {
      const wood = woods[selectedWood];
      const rawImage = wood.raw;
      const coloredImage = wood.colors[selectedColor];

      setImage(beforeImage, rawImage, "#c29a70");
      setImage(afterImage, coloredImage, colorFallbacks[selectedColor]);

      updateSlider(sliderPosition);
    }

    function updateWoodThumbnails() {
      Object.keys(woods).forEach(function(woodKey) {
        const thumb = document.getElementById("thumb-" + woodKey);

        if (thumb) {
          thumb.style.backgroundImage =
            "url('" + woods[woodKey].raw + "')";
        }
      });
    }

    function updateColorDots() {
      Object.keys(colorFallbacks).forEach(function(colorKey) {
        const dot = document.getElementById("dot-" + colorKey);

        if (dot) {
          dot.style.backgroundColor = colorFallbacks[colorKey];
          dot.style.backgroundImage =
            "url('" + woods[selectedWood].colors[colorKey] + "')";
        }
      });
    }

    function updateWaterImage() {
      if (waterPhoto) {
        waterImage.style.backgroundImage = "url('" + waterPhoto + "')";
      } else {
        waterImage.style.backgroundImage =
          "url('" + woods[selectedWood].colors[selectedColor] + "')";
      }
    }

    function getSliderPosition(event) {
      const box = comparisonBox.getBoundingClientRect();

      let clientX = event.clientX;

      if (event.touches && event.touches.length > 0) {
        clientX = event.touches[0].clientX;
      }

      return ((clientX - box.left) / box.width) * 100;
    }

    /* انتخاب چوب */
    document.querySelectorAll(".wood-btn").forEach(function(button) {
      button.addEventListener("click", function() {
        selectedWood = this.dataset.wood;

        document.querySelectorAll(".wood-btn").forEach(function(item) {
          item.classList.remove("active");
        });

        this.classList.add("active");

        updateComparisonImages();
        updateColorDots();
        updateWaterImage();
      });
    });

    /* انتخاب رنگ */
    document.querySelectorAll(".color-btn").forEach(function(button) {
      button.addEventListener("click", function() {
        selectedColor = this.dataset.color;

        document.querySelectorAll(".color-btn").forEach(function(item) {
          item.classList.remove("active");
        });

        this.classList.add("active");

        updateComparisonImages();
        updateWaterImage();
      });
    });

    /* کشیدن اسلایدر با ماوس */
    comparisonBox.addEventListener("mousedown", function(event) {
      isDragging = true;
      updateSlider(getSliderPosition(event));
    });

    window.addEventListener("mousemove", function(event) {
      if (isDragging) {
        updateSlider(getSliderPosition(event));
      }
    });

    window.addEventListener("mouseup", function() {
      isDragging = false;
    });

    /* کشیدن اسلایدر در موبایل */
    comparisonBox.addEventListener("touchstart", function(event) {
      isDragging = true;
      updateSlider(getSliderPosition(event));
    }, { passive: true });

    comparisonBox.addEventListener("touchmove", function(event) {
      if (isDragging) {
        updateSlider(getSliderPosition(event));
      }
    }, { passive: true });

    comparisonBox.addEventListener("touchend", function() {
      isDragging = false;
    });

    /* اجرای اولیه */
    updateWoodThumbnails();
    updateColorDots();
    updateComparisonImages();
    updateWaterImage();
  </script>

</body>
</html>
